services:

  db:
    image: postgres:18
    restart: always
    shm_size: 128mb
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - 5432:5432
    volumes:
      - finance-data:/var/lib/postgresql/18/data
      - ./database/init:/docker-entrypoint-initdb.d

  adminer:
    image: adminer
    restart: always
    ports:
      - 8080:8080

  transaction-service:
    build:
      context: ./services/transaction-service
      dockerfile: Dockerfile
      target: production
    depends_on:
      - db
    environment:
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      DB_ADDRESS: ${DB_ADDRESS}
      DB_PORT: ${DB_PORT}
    ports:
      - 50051:50051

volumes:
  finance-data:
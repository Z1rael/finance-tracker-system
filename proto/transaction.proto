syntax = "proto3";

package finance.transaction;

option go_package = "gen/go/transaction;transaction";

import "google/protobuf/timestamp.proto";
import "google/protobuf/empty.proto";

// Models
enum TransactionType {
    TRANSACTION_TYPE_UNSPECIFIED = 0;
    INCOME = 1;
    EXPENSE = 2;
    TRANSFER = 3;
}

enum TransactionCategory {
    UNSPECIFIED = 0;
    SALARY = 1;
    ALLOWANCE = 2;
    SALES = 3;
    RENT = 4;
    INSURANCE = 5;
    SUBSCRIPTIONS = 6;
    GROCERIES = 7;
    FOOD = 8;
    CLOTHING = 9;
    RECREATION = 10;
    TRAVEL = 11;
    MISCELLANEOUS = 12;
}


message Transaction {
    int64 id                            = 1;
    int64 account_id                    = 2;
    int64 amount                        = 3;
    string description                  = 4;
    TransactionCategory category        = 5;
    TransactionType transaction_type    = 6;
    google.protobuf.Timestamp timestamp = 7;
}

// Requests / Responses

message CreateTransactionRequest {
    int64 account_id                    = 1;
    int64 amount                        = 2;
    string description                  = 3;
    TransactionCategory category        = 4;
    TransactionType transaction_type    = 5;
    google.protobuf.Timestamp timestamp = 6;
}

message CreateTransactionResponse {
    Transaction transaction = 1;
}

message TransferTransactionRequest {
    int64 from_account_id        = 1;
    int64 to_account_id          = 2;
    int64 amount                 = 3;
    string description           = 4;
    TransactionCategory category = 5;  
}

message TransferTransactionResponse {
    Transaction transaction = 1;
}

message UpdateTransactionRequest {
    int64 id                          = 1;
    int64 new_amount                  = 2;
    string new_description            = 3;
    TransactionCategory new_category  = 4;  
    TransactionType new_type          = 5;     
}

message UpdateTransactionResponse {
    Transaction transaction = 1;
}


message ListTransactionsRequest {
    int64 account_id                     = 1;
    google.protobuf.Timestamp start_time = 2;
    google.protobuf.Timestamp end_time   = 3;
}

message ListTransactionsResponse {
    repeated Transaction transactions = 1;
}

message DeleteTransactionRequest {
    int64 id = 1;
}

// Service

service TransactionService {
    rpc CreateTransaction (CreateTransactionRequest) returns (CreateTransactionResponse);
    rpc TransferTransaction (TransferTransactionRequest) returns (TransferTransactionResponse);
    rpc ListTransactions (ListTransactionsRequest) returns (ListTransactionsResponse);
    rpc UpdateTransaction (UpdateTransactionRequest) returns (UpdateTransactionResponse);
    rpc DeleteTransaction (DeleteTransactionRequest) returns (google.protobuf.Empty);
}